spring.application.name=backend
spring.config.import=optional:file:secrets.properties
# --- CONEXIÓN A AZURE SQL ---
# Reemplaza 'sql-subastas-app' con el nombre de tu servidor en Azure
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://sql-subastas-app.database.windows.net:1433;database=db_subastas_core;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;}

# Tu usuario y contraseña de Azure
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin_subastas}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Paras1t0S.}

# --- CONFIGURACIÓN JPA (Hibernate) ---
# Usamos 'none' o 'validate' porque YA creamos las tablas con el script SQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# --- PUERTO DEL SERVIDOR ---
server.port=${PORT:8080}

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- AZURE BLOB STORAGE ---
azure.storage.connection-string=${AZURE_STORAGE_KEY:placeholder}
azure.storage.container-name=productos-img

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- CONFIGURACIÓN EMAIL (SMTP) ---
# Cambiado a Gmail para soportar el correo proporcionado por el usuario
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:tu-correo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# --- MERCADO PAGO 🇨🇱 ---
mercadopago.access.token=${MP_ACCESS_TOKEN:placeholder}
mercadopago.public.key=${MP_PUBLIC_KEY:placeholder}

# --- PRODUCCIÓN ---
app.frontend.url=https://www.subastashop.cl

# --- WEB PUSH NOTIFICATIONS (VAPID) ---
vapid.public.key=${VAPID_PUBLIC_KEY:placeholder}
vapid.private.key=${VAPID_PRIVATE_KEY:placeholder}
vapid.subject=${VAPID_SUBJECT:mailto:soporte@subastashop.com}
